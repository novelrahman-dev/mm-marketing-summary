<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Menopause — Marketing Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f8f7f4;--surface:#fff;--border:rgba(0,0,0,.09);--text:#1a1a18;--muted:#6b6b67;
  --radius:10px;--purple-bg:#EEEDFE;--purple-border:#c5c3f5;--purple-text:#3C3489;
  --teal-bg:#E1F5EE;--teal-text:#085041;--amber-bg:#FAEEDA;--amber-text:#6B4C00;
  --red-bg:#FEEDED;--red-text:#8B1A1A;--green-bg:#E6F4EA;--green-text:#1A5C2A;
  --blue-bg:#E8F1FE;--blue-text:#1A3A8B;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
header{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
header h1{font-size:15px;font-weight:700;white-space:nowrap;}
#meta{font-size:11px;color:var(--muted);white-space:nowrap;}
nav{display:flex;gap:2px;padding:10px 24px 0;border-bottom:1px solid var(--border);background:#fff;overflow-x:auto;}
nav button{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:600;white-space:nowrap;}
nav button.active{color:var(--text);border-bottom-color:#3C3489;}
nav button:hover:not(.active){color:var(--text);}
.tab{display:none;padding:20px 24px;}
.tab.active{display:block;}

.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:20px 0 8px;}
.sec:first-child{margin-top:0;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.card .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.card .val{font-size:22px;font-weight:800;line-height:1.1;}
.card .sub{font-size:10px;color:var(--muted);margin-top:4px;}

.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;}
.tag-brand{background:var(--purple-bg);color:var(--purple-text);}
.tag-nb{background:var(--teal-bg);color:var(--teal-text);}
.tag-pmax{background:var(--amber-bg);color:var(--amber-text);}
.tag-good{background:var(--green-bg);color:var(--green-text);}
.tag-warn{background:var(--amber-bg);color:var(--amber-text);}
.tag-bad{background:var(--red-bg);color:var(--red-text);}
.tag-scaling{background:var(--green-bg);color:var(--green-text);}
.tag-testing{background:var(--amber-bg);color:var(--amber-text);}
.tag-holding{background:var(--purple-bg);color:var(--purple-text);}
.tag-new{background:var(--blue-bg);color:var(--blue-text);}
.tag-hidden{background:#f0f0ef;color:var(--muted);}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;margin-bottom:6px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
th{background:#f5f4f1;font-weight:700;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);}
td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.r{text-align:right;}
.footnote{font-size:10px;color:var(--muted);margin-bottom:16px;padding-left:2px;}

.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.ic{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.ic-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.ic-icon{font-size:20px;line-height:1;flex-shrink:0;}
.ic-title{font-weight:700;font-size:13px;}
.ic-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.ic ul{list-style:none;}
.ic ul li{font-size:11.5px;color:var(--text);padding:5px 0;border-bottom:1px solid var(--border);line-height:1.4;}
.ic ul li:last-child{border:none;padding-bottom:0;}
.dim{color:var(--muted);font-size:10px;}

.narrative{background:#fdfcf9;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;}
.narrative h3{font-size:12px;font-weight:700;margin-bottom:8px;}
.narrative p{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:5px;}
.narrative p:last-child{margin:0;}
.narrative strong{color:var(--text);}

.bottom-line{background:var(--purple-bg);border:1px solid var(--purple-border);border-radius:var(--radius);padding:14px 18px;}
.bl-title{font-weight:700;font-size:12px;color:var(--purple-text);margin-bottom:6px;}
.bl-body{font-size:12px;color:var(--purple-text);line-height:1.6;}

.pace-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.pace-row:last-child{border:none;}
.pace-name{width:280px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.pace-bar-bg{flex:1;background:#eee;border-radius:4px;height:8px;overflow:hidden;min-width:60px;}
.pace-bar-fill{height:8px;border-radius:4px;}
.pace-spend{width:68px;text-align:right;font-size:11px;font-weight:700;}
.pace-purch{width:60px;text-align:right;font-size:10px;color:var(--muted);}

.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:6px;}
.chart-wrap h3{font-size:12px;font-weight:700;margin-bottom:12px;}

.funnel-steps{display:flex;gap:0;margin:12px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.funnel-step{flex:1;padding:14px 12px;text-align:center;border-right:1px solid var(--border);}
.funnel-step:last-child{border-right:none;}
.funnel-step .fs-label{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:600;margin-bottom:4px;}
.funnel-step .fs-val{font-size:18px;font-weight:800;}
.funnel-step .fs-rate{font-size:10px;color:var(--muted);margin-top:2px;}

.creative-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.creative-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.cc-rank{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:6px;}
.cc-name{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.cc-metric{font-size:10px;color:var(--muted);}
.cc-metric strong{color:var(--text);font-size:11px;}
.cc-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:3px;}
.cc-tag{font-size:9px;padding:1px 5px;border-radius:3px;background:#f0f0ef;color:var(--muted);font-weight:600;}

.no-data{text-align:center;padding:40px 20px;color:var(--muted);font-size:12px;}
.error-box{background:var(--red-bg);border:1px solid #f5c0c0;border-radius:var(--radius);padding:16px 20px;margin:20px 0;color:var(--red-text);}
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
</style>
</head>
<body>

<header>
  <h1>🌿 Modern Menopause — Marketing Dashboard</h1>
  <span id="meta">Loading…</span>
</header>

<nav>
  <button class="active" onclick="showTab('insights-sem',this)">💡 Insights — SEM</button>
  <button onclick="showTab('insights-social',this)">📱 Insights — Social</button>
  <button onclick="showTab('campaigns-adwords',this)">📊 Campaigns — Adwords</button>
  <button onclick="showTab('campaigns-facebook',this)">📘 Campaigns — Facebook</button>
  <button onclick="showTab('funnel',this)">🌐 Site Funnel</button>
</nav>

<div id="insights-sem"    class="tab active"><div class="loading">Loading…</div></div>
<div id="insights-social" class="tab"><div class="loading">Loading…</div></div>
<div id="campaigns-adwords"  class="tab"><div class="loading">Loading…</div></div>
<div id="campaigns-facebook" class="tab"><div class="loading">Loading…</div></div>
<div id="funnel"          class="tab"><div class="loading">Loading…</div></div>

<script>
const $e = id => document.getElementById(id);

const fmtCAD  = v => v == null ? '—' : '$' + Number(v).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtCAD2 = v => v == null ? '—' : '$' + Number(v).toFixed(2);
const fmtNum  = v => v == null ? '—' : Number(v).toLocaleString();
const fmtPct  = (v,d=1) => v == null ? '—' : Number(v).toFixed(d)+'%';
const fmtX    = v => v == null ? '—' : Number(v).toFixed(2)+'x';

function showTab(id, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  $e(id).classList.add('active'); btn.classList.add('active');
}

// ── CPA tags: Google target ≤$175
function cpaTag(cpa){
  if(cpa==null) return '<span style="color:var(--muted)">—</span>';
  if(cpa<=100)  return `<span class="tag tag-good">${fmtCAD2(cpa)}</span>`;
  if(cpa<=175)  return `<span class="tag tag-warn">${fmtCAD2(cpa)}</span>`;
  return `<span class="tag tag-bad">${fmtCAD2(cpa)}</span>`;
}

// ── CPA tags: Facebook target ≤$100
function cpaTagFB(cpa){
  if(cpa==null) return '<span style="color:var(--muted)">—</span>';
  if(cpa<=100)  return `<span class="tag tag-good">${fmtCAD2(cpa)}</span>`;
  if(cpa<=150)  return `<span class="tag tag-warn">${fmtCAD2(cpa)}</span>`;
  return `<span class="tag tag-bad">${fmtCAD2(cpa)}</span>`;
}

function campTag(name, type){
  const l = name.toLowerCase();
  if(l.includes('[brand]')||l.includes('brand')) return '<span class="tag tag-brand">Brand</span>';
  if(type==='PERFORMANCE_MAX'||l.includes('pmax')||l.includes('[pmax]')) return '<span class="tag tag-pmax">PMax</span>';
  return '<span class="tag tag-nb">NB</span>';
}

function spendStateTag(state){
  const s = (state||'').toLowerCase();
  const labels = {scaling:'🚀 Scaling',testing:'🧪 Testing',holding:'⏸ Holding',new:'✨ New',hidden:'👁 Hidden'};
  const cls = {scaling:'tag-scaling',testing:'tag-testing',holding:'tag-holding',new:'tag-new',hidden:'tag-hidden'};
  return `<span class="tag ${cls[s]||'tag-hidden'}">${labels[s]||state||'—'}</span>`;
}

function sc(name){ return name.replace(/_/g,' '); }
function dash(v)  { return v==null||v===0?'—':v; }

// ═══════════════════════════════════════════════════════════════════════════
// INSIGHTS — SEM
// ═══════════════════════════════════════════════════════════════════════════
function renderInsightsSEM(d){
  const camps = d.report1_campaigns || [];
  const totals = d.totals || {};
  const t14=totals['14d']||{}, t7=totals['7d']||{}, ty=totals.yesterday||{};
  const ga4ch = d.ga4_channel_funnel || [];
  const gpGA4 = ga4ch.find(c=>c.channel==='Paid Search');
  const gCVR = gpGA4 ? (gpGA4.conversions_purchase/gpGA4.sessions*100).toFixed(2) : null;
  const dow = new Date(d.date_yesterday).getDay();
  const target = (dow===0||dow===6) ? 2000 : 3000;
  const pacePct = ty.cost ? ty.cost/target*100 : 0;

  const withPurch = camps.filter(c=>c.purchases_14d>0.5)
    .map(c=>({...c,cpa14:c.cost_14d/c.purchases_14d}))
    .sort((a,b)=>a.cpa14-b.cpa14);
  const best3 = withPurch.slice(0,3);
  const investigate = camps.filter(c=>c.cpa_7d&&c.cpa_7d>175).sort((a,b)=>b.cpa_7d-a.cpa_7d);
  const hrt = camps.find(c=>c.campaign.includes('HRT'));
  const hrtSpend = hrt ? hrt.cost_14d : 0;
  const brandCamp = camps.find(c=>c.campaign.toLowerCase().includes('[brand]')&&c.campaign.includes('Max_clicks'));
  const brandIS = brandCamp ? brandCamp.top_is : null;
  const best = withPurch[0], worst = withPurch[withPurch.length-1];

  let lines = [];
  if(t7.cpa) lines.push(`<strong>7d CPA is ${fmtCAD2(t7.cpa)}</strong> — ${t7.cpa<=175?'✅ within':'⚠️ above'} the $175 target. 14d blended CPA is <strong>${fmtCAD2(t14.cpa)}</strong> across <strong>${Math.round(t14.purchases||0)} purchases</strong>.`);
  lines.push(`Yesterday: <strong>${fmtCAD(ty.cost)}</strong> spend (${pacePct.toFixed(0)}% of ${fmtCAD(target)} ${(dow===0||dow===6)?'weekend':'weekday'} target), <strong>${ty.purchases!=null?ty.purchases.toFixed(1):'—'} purchases</strong> at <strong>${fmtCAD2(ty.cpa)} CPA</strong>.`);
  if(best&&worst&&best.campaign!==worst.campaign) lines.push(`Best 14d: <strong>${sc(best.campaign).substring(0,44)}</strong> at <strong>${fmtCAD2(best.cpa14)} CPA</strong>. Worst: <strong>${sc(worst.campaign).substring(0,40)}</strong> at <strong>${fmtCAD2(worst.cpa14)} CPA</strong>.`);
  if(hrtSpend>0) lines.push(`🔴 <strong>HRT campaign has spent ${fmtCAD(hrtSpend)} (14d)</strong> — LP gated until Jul 6, pause immediately.`);
  else if(investigate.length>0) lines.push(`⚠️ <strong>${investigate.length} campaign${investigate.length>1?'s':''}</strong> running above $175 CPA (7d) — see Investigate card.`);
  else lines.push(`✅ No structural flags. All campaigns within acceptable parameters.`);

  const lp = d.landing_page_funnel || [];
  const blogLP = lp.find(p=>p.page==='Blog Post');
  const bookLP = lp.find(p=>p.page==='Book Initial');
  const cityLP = lp.find(p=>p.page==='City Page');
  const partnershipCh = ga4ch.find(c=>c.channel==='Partnerships');
  const aiCh = ga4ch.find(c=>c.channel==='AI Assistant');
  const paidSocialCh = ga4ch.find(c=>c.channel==='Paid Social');

  let siteLines = [];
  if(bookLP) siteLines.push(`🎯 <strong>Book Initial Assessment</strong> is your highest-converting landing page at <strong>${bookLP.cvr}% CVR</strong>. ${bookLP.sessions.toLocaleString()} sessions drove <strong>${bookLP.purchases} purchases</strong> (30d).`);
  if(cityLP) siteLines.push(`📍 <strong>City Pages</strong> convert at <strong>${cityLP.cvr}% CVR</strong> with ${cityLP.sessions.toLocaleString()} sessions — best high-volume page type after direct booking.`);
  if(blogLP) siteLines.push(`📝 <strong>Blog Posts</strong> drive ${blogLP.sessions.toLocaleString()} sessions but convert at <strong>${blogLP.cvr}% CVR</strong> — awareness traffic only. Consider stronger CTAs linking to booking pages.`);
  if(partnershipCh) siteLines.push(`🤝 <strong>Partnerships (Venngo)</strong>: <strong>${(partnershipCh.engagement_rate*100).toFixed(0)}% engagement</strong>, <strong>${(partnershipCh.conversions_purchase/partnershipCh.sessions*100).toFixed(2)}% CVR</strong> — matching Paid Search quality. Worth scaling.`);
  if(aiCh) siteLines.push(`🤖 <strong>AI Assistant</strong> has the highest CVR of any channel at <strong>${(aiCh.conversions_purchase/aiCh.sessions*100).toFixed(2)}%</strong> — ultra-high intent, only ${aiCh.sessions} sessions but converts.`);
  if(paidSocialCh) siteLines.push(`📱 <strong>Paid Social</strong> has a <strong>${(paidSocialCh.bounce_rate*100).toFixed(0)}% bounce rate</strong> and <strong>${(paidSocialCh.conversions_purchase/paidSocialCh.sessions*100).toFixed(2)}% CVR</strong> — weakest channel quality on site. Meta traffic not converting at booking level.`);

  const campPaceRows = camps.filter(c=>c.yest_cost>0)
    .sort((a,b)=>b.yest_cost-a.yest_cost)
    .map(c=>{
      const pct = Math.min(c.yest_cost/target*100,120);
      const col = pct>100?'#c0392b':pct>60?'#3C3489':'#aaa';
      return `<div class="pace-row">
        <div class="pace-name" title="${c.campaign}">${sc(c.campaign).substring(0,44)}</div>
        <div class="pace-bar-bg"><div class="pace-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="pace-spend" style="color:${col}">${fmtCAD(c.yest_cost)}</div>
        <div class="pace-purch">${c.yest_purchases>0?c.yest_purchases.toFixed(1)+' purch':'0 purch'}</div>
      </div>`;
    }).join('');

  $e('insights-sem').innerHTML = `
    <div class="sec">Account Snapshot — ${d.date_yesterday}</div>
    <div class="cards">
      <div class="card"><div class="lbl">Yesterday Spend</div><div class="val">${fmtCAD(ty.cost)}</div><div class="sub">${pacePct.toFixed(0)}% of ${fmtCAD(target)} target</div></div>
      <div class="card"><div class="lbl">Yesterday CPA</div><div class="val">${fmtCAD2(ty.cpa)}</div><div class="sub">[gtag] purchase</div></div>
      <div class="card"><div class="lbl">7d CPA</div><div class="val">${fmtCAD2(t7.cpa)}</div><div class="sub">target ≤ $175</div></div>
      <div class="card"><div class="lbl">14d Spend</div><div class="val">${fmtCAD(t14.cost)}</div><div class="sub">${fmtNum(Math.round(t14.purchases||0))} purchases</div></div>
      <div class="card"><div class="lbl">14d CPA</div><div class="val">${fmtCAD2(t14.cpa)}</div><div class="sub">blended all campaigns</div></div>
      <div class="card"><div class="lbl">Google Paid CVR</div><div class="val">${gCVR!=null?gCVR+'%':'—'}</div><div class="sub">purchases / sessions (30d)</div></div>
    </div>

    <div class="sec">Morning Briefing — ${d.date_yesterday}</div>
    <div class="narrative"><h3>📋 Google Ads Summary</h3>${lines.map(l=>`<p>${l}</p>`).join('')}</div>

    <div class="sec">Site & Channel Insights (GA4, 30d)</div>
    <div class="narrative" style="background:#f0f9f7;border-left:3px solid #085041">
      <h3>🌐 What the funnel data is telling us</h3>
      ${siteLines.map(l=>`<p>${l}</p>`).join('')}
    </div>

    <div class="sec">Yesterday Spend Pacing vs ${fmtCAD(target)} ${(dow===0||dow===6)?'Weekend':'Weekday'} Target</div>
    <div class="tbl-wrap" style="padding:10px 14px;">${campPaceRows||'<p class="no-data">No spend data</p>'}</div>

    <div class="sec">Action Cards</div>
    <div class="insight-grid">
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">🚀</span><div><div class="ic-title">Double Down</div><div class="ic-sub">Lowest 14d CPA — scale these</div></div></div>
        <ul>${best3.length?best3.map(c=>`<li><strong>${sc(c.campaign).substring(0,44)}</strong><br><span class="dim">14d CPA: <strong>${fmtCAD2(c.cpa14)}</strong> · Spend: ${fmtCAD(c.cost_14d)} · Purchases: ${c.purchases_14d.toFixed(1)}</span></li>`).join(''):'<li>No data</li>'}</ul>
      </div>
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">⚠️</span><div><div class="ic-title">Investigate</div><div class="ic-sub">7d CPA above $175 — review or cut</div></div></div>
        <ul>${investigate.length?investigate.map(c=>`<li>${cpaTag(c.cpa_7d)} <strong>${sc(c.campaign).substring(0,36)}</strong><br><span class="dim">7d spend: ${fmtCAD(c.cost_7d)} · 14d CPA: ${fmtCAD2(c.cpa_14d)}</span></li>`).join(''):'<li>✅ All campaigns within target</li>'}</ul>
      </div>
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">🏆</span><div><div class="ic-title">Best Performer</div><div class="ic-sub">14d lowest CPA with volume</div></div></div>
        <ul>${best?`<li><strong>${sc(best.campaign)}</strong></li><li><span class="dim">14d CPA</span> ${cpaTag(best.cpa14)}</li><li><span class="dim">14d Spend</span> <strong>${fmtCAD(best.cost_14d)}</strong></li><li><span class="dim">Purchases</span> <strong>${best.purchases_14d.toFixed(1)}</strong></li>`:'<li>No data</li>'}</ul>
      </div>
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">🚨</span><div><div class="ic-title">Structural Flags</div><div class="ic-sub">Always-on checks</div></div></div>
        <ul>
          <li>${hrtSpend>0?`🔴 <strong>HRT spending ${fmtCAD(hrtSpend)} (14d)</strong> — LP gated Jul 6, PAUSE`:'✅ HRT not spending (correct)'}</li>
          <li>${brandIS!=null&&brandIS<80?`🔴 Brand Top IS: <strong>${(brandIS*100).toFixed(1)}%</strong> — below 80%`:brandIS!=null?`✅ Brand Top IS: <strong>${(brandIS*100).toFixed(1)}%</strong>`:'— Brand IS: no yesterday data'}</li>
          <li>${worst&&worst.cpa14>300?`📉 Worst: <strong>${sc(worst.campaign).substring(0,34)}</strong> ${fmtCAD2(worst.cpa14)} CPA (14d)`:'✅ No campaigns above $300 CPA (14d)'}</li>
        </ul>
      </div>
    </div>

    <div class="bottom-line">
      <div class="bl-title">Bottom Line</div>

// INSIGHTS — SOCIAL

function renderInsightsSocial(d){
  const fb = d.fb_totals || {};

  const hasData = ty.spend != null;

  if(!hasData){
    $e('insights-social').innerHTML = `
      <div class="narrative" style="background:#f0f9f7;border-left:3px solid #3C3489;">
        <h3>📱 Facebook Insights</h3>
        <p>Facebook data will appear here after the next morning update once the FB pipeline steps are added.</p>
        <p>Run <strong>pull morning data</strong> after the skill file is updated to populate this tab.</p>
      </div>`;

  }

  // Scroll funnel totals from Windsor (pixel data)
  const scroll50_14 = t14.scroll50||0, scroll90_14 = t14.scroll90||0, scroll99_14 = t14.scroll99||0;
  const ctaClickRate = t14.link_clicks ? (scroll50_14/t14.link_clicks*100).toFixed(1) : null;
  const formRate     = scroll50_14 ? (scroll90_14/scroll50_14*100).toFixed(1) : null;
  const apptRate     = scroll99_14 ? (scroll99_14/t14.link_clicks*100).toFixed(2) : null;

  // Top creatives by CPA (motion)
  const withConv = motion.filter(c=>c.scroll99_count>0).sort((a,b)=>a.cpa-b.cpa);
  const top3 = withConv.slice(0,3);
  const scale = motion.filter(c=>c.cpa!=null&&c.cpa<=100&&c.spend>100);
  const watch = motion.filter(c=>c.cpa!=null&&c.cpa>100);
  const fatigued = motion.filter(c=>c.wow_change&&parseFloat(c.wow_change)<-20&&c.cpa>100);

  // Build narrative
  let fbLines = [];
  if(t7.cpa!=null) fbLines.push(`<strong>7d CPA is ${fmtCAD2(t7.cpa)}</strong> — ${t7.cpa<=100?'✅ within':'⚠️ above'} the $100 target. 14d blended CPA is <strong>${fmtCAD2(t14.cpa)}</strong> across <strong>${scroll99_14} scroll99 purchases</strong>.`);
  fbLines.push(`Yesterday: <strong>${fmtCAD(ty.spend)}</strong> spend, <strong>${ty.purchases||0} purchases</strong> at <strong>${fmtCAD2(ty.cpa)} CPA</strong>.`);
  if(scale.length>0) fbLines.push(`🟢 <strong>${scale.length} creative${scale.length>1?'s':''}</strong> at or below $100 CPA — scale opportunities available.`);
  if(fatigued.length>0) fbLines.push(`⚠️ <strong>${fatigued.length} creative${fatigued.length>1?'s':''}</strong> showing fatigue (WoW spend declining + CPA above target).`);
  else fbLines.push(`✅ No creative fatigue flags detected.`);

  // Creative cards
  const creativeCardsHTML = top3.length ? `
    <div class="creative-cards">
      ${top3.map((c,i)=>{
        const tags = c.tags||{};
        const tagList = [tags.asset_type, tags.messaging_theme, tags.visual_format].filter(Boolean);
        return `<div class="creative-card">
          <div class="cc-rank">#${i+1} by CPA (14d) ${spendStateTag(c.spend_state)}</div>
          <div class="cc-name" title="${c.ad_name}">${c.ad_name||'—'}</div>
          <div class="cc-metrics">
            <div class="cc-metric"><strong>${fmtCAD2(c.cpa)}</strong><br>CPA (scroll99)</div>
            <div class="cc-metric"><strong>${fmtCAD(c.spend)}</strong><br>Spend (14d)</div>
            <div class="cc-metric"><strong>${c.scroll99_count}</strong><br>Purchases</div>
            <div class="cc-metric"><strong>${c.thumbstop_ratio!=null?(c.thumbstop_ratio*100).toFixed(1)+'%':'—'}</strong><br>Thumbstop</div>
          </div>
          <div class="cc-tags">${tagList.map(t=>`<span class="cc-tag">${t}</span>`).join('')}</div>
        </div>`;
      }).join('')}
    </div>` : `<p class="no-data">No Motion creative data yet. Populate fb_totals via pipeline first.</p>`;

  // Tag performance table
  const tagCategories = [
    {key:'messaging_theme', label:'Messaging Theme'},
    {key:'hook_tactic',     label:'Hook Tactic'},
    {key:'asset_type',      label:'Asset Type'},
    {key:'visual_format',   label:'Visual Format'},
  ];
  const tagTableRows = tagCategories.flatMap(cat=>{
    const rows = (motionTags[cat.key]||[]).sort((a,b)=>a.cpa-b.cpa);
    return rows.map((r,i)=>`<tr>
      <td>${i===0?`<strong>${cat.label}</strong>`:''}</td>
      <td>${r.tag}</td>
      <td class="r">${fmtCAD(r.spend)}</td>
      <td class="r">${r.scroll99_count}</td>
      <td class="r">${cpaTagFB(r.cpa)}</td>
    </tr>`);
  }).join('');

  // Spend state summary
  const stateHTML = Object.entries(motionStates).length ?
    Object.entries(motionStates).map(([s,n])=>`${spendStateTag(s)} <span style="font-size:11px">${n} ad${n!==1?'s':''}</span>`).join('  &nbsp;') :
    '<span style="color:var(--muted);font-size:12px">No state data yet</span>';

  $e('insights-social').innerHTML = `
    <div class="sec">Account Snapshot — ${d.date_yesterday}</div>
    <div class="cards">
      <div class="card"><div class="lbl">Yesterday Spend</div><div class="val">${fmtCAD(ty.spend)}</div><div class="sub">Meta Ads (CAD)</div></div>
      <div class="card"><div class="lbl">Yesterday CPA</div><div class="val">${fmtCAD2(ty.cpa)}</div><div class="sub">scroll99 (confirmed appt)</div></div>
      <div class="card"><div class="lbl">7d CPA</div><div class="val">${fmtCAD2(t7.cpa)}</div><div class="sub">target ≤ $100</div></div>
      <div class="card"><div class="lbl">14d Spend</div><div class="val">${fmtCAD(t14.spend)}</div><div class="sub">${scroll99_14} scroll99 purchases</div></div>
      <div class="card"><div class="lbl">14d CPA</div><div class="val">${fmtCAD2(t14.cpa)}</div><div class="sub">blended all campaigns</div></div>
      <div class="card"><div class="lbl">14d ROAS</div><div class="val">${t14.roas!=null?t14.roas.toFixed(2)+'x':'—'}</div><div class="sub">scroll99 × $295 / spend</div></div>
    </div>

    <div class="sec">Morning Briefing — ${d.date_yesterday}</div>
    <div class="narrative" style="border-left:3px solid #1877F2"><h3>📱 Facebook Ads Summary</h3>${fbLines.map(l=>`<p>${l}</p>`).join('')}</div>

    <div class="sec">Funnel Health — Last 14 Days (Pixel)</div>
    <div class="funnel-steps">
      <div class="funnel-step">
        <div class="fs-label">Link Clicks</div>
        <div class="fs-val">${fmtNum(t14.link_clicks)}</div>
        <div class="fs-rate">from ${fmtNum(t14.impressions)} impr.</div>
      </div>
      <div class="funnel-step">
        <div class="fs-label">→ CTA Click (scroll50)</div>
        <div class="fs-val">${fmtNum(scroll50_14)}</div>
        <div class="fs-rate">${ctaClickRate!=null?ctaClickRate+'% of clicks':'—'}</div>
      </div>
      <div class="funnel-step">
        <div class="fs-label">→ Form Submit (scroll90)</div>
        <div class="fs-val">${fmtNum(scroll90_14)}</div>
        <div class="fs-rate">${formRate!=null?formRate+'% of scroll50':'—'}</div>
      </div>
      <div class="funnel-step">
        <div class="fs-label">→ Purchase (scroll99)</div>
        <div class="fs-val">${fmtNum(scroll99_14)}</div>
        <div class="fs-rate">${apptRate!=null?apptRate+'% of clicks':'—'}</div>
      </div>
    </div>
    <p class="footnote">Pixel funnel — scroll50 = CTA clicked, scroll90 = form submitted, scroll99 = payment confirmed</p>

    <div class="sec">PostHog Funnel — Last 14 Days (utm_source = paid_social_media)</div>
    <div class="funnel-steps">
      <div class="funnel-step"><div class="fs-label">Appts Clicked</div><div class="fs-val">${fmtNum(fn14.ph_appts)}</div><div class="fs-rate">${fn14.appts_per_click!=null?fn14.appts_per_click.toFixed(1)+'% of clicks':'—'}</div></div>
      <div class="funnel-step"><div class="fs-label">Forms Submitted</div><div class="fs-val">${fmtNum(fn14.ph_forms)}</div><div class="fs-rate">${fn14.forms_per_appt!=null?fn14.forms_per_appt.toFixed(1)+'% of appts':'—'}</div></div>
      <div class="funnel-step"><div class="fs-label">Purchases</div><div class="fs-val">${fmtNum(fn14.ph_purchases)}</div><div class="fs-rate">${fn14.purch_per_form!=null?fn14.purch_per_form.toFixed(1)+'% of forms':'—'}</div></div>
    </div>

    <div class="sec">Creative Intelligence — Top Performers (Motion, 14d)</div>
    <div style="margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span style="font-size:11px;color:var(--muted);font-weight:600;">Creative States:</span>
      ${stateHTML}
    </div>
    ${creativeCardsHTML}

    ${tagTableRows ? `
    <div class="sec">Creative Tag Performance (Motion, 14d)</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Category</th><th>Tag Value</th><th class="r">Spend</th><th class="r">scroll99</th><th class="r">CPA</th></tr></thead>
        <tbody>${tagTableRows}</tbody>
      </table>
    </div>
    <p class="footnote">Sorted by CPA within each category. Goal metric = scroll99_cost (CPA on confirmed appointments).</p>
    ` : ''}

    <div class="sec">Action Cards</div>
    <div class="insight-grid">
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">🟢</span><div><div class="ic-title">Scale — CPA ≤ $100</div><div class="ic-sub">Creatives with confirmed ROI</div></div></div>
        <ul>${scale.length ? scale.slice(0,4).map(c=>`<li>${spendStateTag(c.spend_state)} <strong>${(c.ad_name||'').substring(0,38)}</strong><br><span class="dim">CPA: <strong>${fmtCAD2(c.cpa)}</strong> · Spend: ${fmtCAD(c.spend)} · WoW: ${c.wow_change||'—'}%</span></li>`).join('') : '<li>No creatives at or below $100 CPA yet</li>'}</ul>
      </div>
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">🔴</span><div><div class="ic-title">Watch / Cut — CPA > $100</div><div class="ic-sub">Review spend efficiency</div></div></div>
        <ul>${watch.length ? watch.slice(0,4).map(c=>`<li>${cpaTagFB(c.cpa)} <strong>${(c.ad_name||'').substring(0,38)}</strong><br><span class="dim">Spend: ${fmtCAD(c.spend)} · WoW: ${c.wow_change||'—'}%</span></li>`).join('') : '<li>✅ All creatives at or below target</li>'}</ul>

        <ul>${(motionTags.messaging_theme||[]).slice(0,3).map(t=>`<li><strong>${t.tag}</strong><br><span class="dim">CPA: ${fmtCAD2(t.cpa)} · scroll99: ${t.scroll99_count} · Spend: ${fmtCAD(t.spend)}</span></li>`).join('') || '<li>No Motion tag data yet</li>'}</ul>

        <div class="ic-head"><span class="ic-icon">⚡</span><div><div class="ic-title">Creative Fatigue</div><div class="ic-sub">WoW declining + CPA above target</div></div></div>
        <ul>${fatigued.length ? fatigued.slice(0,3).map(c=>`<li>📉 <strong>${(c.ad_name||'').substring(0,38)}</strong><br><span class="dim">WoW: ${c.wow_change}% · CPA: ${fmtCAD2(c.cpa)} · ${spendStateTag(c.spend_state)}</span></li>`).join('') : '<li>✅ No creative fatigue detected</li>'}</ul>
      </div>
    </div>`;
}

function renderCampaignsAdwords(d){
  const camps = d.report1_campaigns || [];
  const totals = d.totals || {};
  const t14=totals['14d']||{}, t7=totals['7d']||{}, ty=totals.yesterday||{};
  const daily = d.daily||[];

  const fullHdr = `

    <th class="r">Spend</th><th class="r">Appts/Clicks</th><th class="r">Forms/Appts</th>

  const campRows = camps.map(c=>`<tr>

    <td class="r">${fmtCAD(r.cost)}</td>
    <td class="r">${r.appts_per_click!=null?r.appts_per_click.toFixed(1)+'%':'—'}</td>
    <td class="r">${r.forms_per_appt!=null?r.forms_per_appt.toFixed(1)+'%':'—'}</td>
    <td class="r">${r.purch_per_form!=null?r.purch_per_form.toFixed(1)+'%':'—'}</td>
    <td class="r">${r.roas!=null?r.roas.toFixed(2)+'x':'—'}</td>

    <td class="r">${r.purchases!=null?r.purchases.toFixed(1):'—'}</td>
    <td class="r">${cpaTag(r.cpa)}</td>
  </tr>`).join('');

  // ── Google regional table ────────────────────────────────────────────────
  const gRegion = d.google_region || {};

// SITE FUNNEL (unchanged)
// ═══════════════════════════════════════════════════════════════════════════
function renderFunnel(d){
  const daily14     = d.daily14_funnel      || [];
  const ga4_channels= d.ga4_channel_funnel  || [];
  const landing_pages=d.landing_page_funnel || [];
  const overlap_matrix   = d.channel_overlap         || {};
  const overlap_channels = d.channel_overlap_channels|| [];

  const chanRows = ga4_channels.map(c=>{
    const cvr = c.sessions>0?(c.conversions_purchase/c.sessions*100).toFixed(2):'—';
    const cvrNum = c.sessions>0?c.conversions_purchase/c.sessions*100:0;
    const cvrColor = cvrNum>=1.5?'color:#085041;font-weight:700':cvrNum>=0.8?'color:#d4a017;font-weight:700':'color:#c0392b';
    return `<tr>
      <td><strong>${c.channel}</strong></td>
      <td class="r">${fmtNum(c.sessions)}</td>
      <td class="r">${(c.engagement_rate*100).toFixed(1)}%</td>
      <td class="r">${(c.bounce_rate*100).toFixed(1)}%</td>
      <td class="r">${c.avg_duration}</td>
      <td class="r">${c.conversions_purchase}</td>
      <td class="r" style="${cvrColor}">${cvr!=='—'?cvr+'%':'—'}</td>
    </tr>`;
  }).join('');

  const lpRows = landing_pages.map(p=>{
    const cvrNum=p.cvr||0;
    const cvrColor=cvrNum>=5?'color:#085041;font-weight:700':cvrNum>=1?'color:#d4a017;font-weight:700':'color:#c0392b';
    return `<tr>
      <td><strong>${p.page}</strong></td>
      <td class="r">${fmtNum(p.sessions)}</td>
      <td class="r">${(p.engagement_rate*100).toFixed(1)}%</td>
      <td class="r">${(p.bounce_rate*100).toFixed(1)}%</td>
      <td class="r">${p.avg_duration}</td>
      <td class="r">${p.purchases}</td>
      <td class="r" style="${cvrColor}">${p.cvr}%</td>
    </tr>`;
  }).join('');

  const matrixHeader = overlap_channels.map(ch=>`<th class="r" style="font-size:10px;white-space:nowrap">${ch.replace('Cross-network','Cross-net').replace('Organic ','Org. ').replace('Paid ','Pd. ')}</th>`).join('');
  const matrixRows = overlap_channels.map(acq=>{
    const cells = overlap_channels.map(last=>{
      const key=`${acq}|${last}`;
      const pct=overlap_matrix[key]||0;
      const isDiag=acq===last;
      const bg=isDiag?'background:#e8e4f8;font-weight:700':pct>20?'background:#d5ede9':pct>5?'background:#f0f9f7':'';
      return `<td class="r" style="font-size:11px;${bg}">${pct>0?pct+'%':'—'}</td>`;
    }).join('');
    const label=acq.replace('Cross-network','Cross-net').replace('Organic ','Org. ').replace('Paid ','Pd. ');
    return `<tr><td style="font-size:11px;white-space:nowrap"><strong>${label}</strong></td>${cells}</tr>`;
  }).join('');

  const dailyFunnelRows = daily14.map(r=>{
    const apptR  = r.sessions>0?(r.appt_sessions/r.sessions*100).toFixed(1):'—';
    const formR  = r.appt_sessions>0?(r.form_sessions/r.appt_sessions*100).toFixed(1):'—';
    const purchR = r.form_sessions>0?(r.purchase_sessions/r.form_sessions*100).toFixed(1):'—';
    const cvr    = r.sessions>0?(r.purchase_sessions/r.sessions*100).toFixed(2):'—';
    return `<tr>
      <td>${r.date}</td><td class="r">${fmtNum(r.sessions)}</td>
      <td class="r">${apptR!=='—'?apptR+'%':'—'}</td>
      <td class="r">${formR!=='—'?formR+'%':'—'}</td>
      <td class="r">${purchR!=='—'?purchR+'%':'—'}</td>
      <td class="r"><strong>${cvr!=='—'?cvr+'%':'—'}</strong></td>
    </tr>`;
  }).join('');

  const labels = daily14.map(r=>r.date.slice(5));
  const apptR  = daily14.map(r=>r.sessions>0?+(r.appt_sessions/r.sessions*100).toFixed(2):0);
  const formR  = daily14.map(r=>r.appt_sessions>0?+(r.form_sessions/r.appt_sessions*100).toFixed(2):0);
  const purchR = daily14.map(r=>r.form_sessions>0?+(r.purchase_sessions/r.form_sessions*100).toFixed(2):0);
  const cvrR   = daily14.map(r=>r.sessions>0?+(r.purchase_sessions/r.sessions*100).toFixed(2):0);

  $e('funnel').innerHTML = `
    <div class="sec">Channel Performance — Last 30 Days (GA4)</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Channel</th><th class="r">Sessions</th><th class="r">Engagement Rate</th><th class="r">Bounce Rate</th><th class="r">Avg Duration</th><th class="r">Purchases</th><th class="r">CVR</th></tr></thead>
      <tbody>${chanRows}</tbody>
    </table></div>
    <p class="footnote">Source: GA4. CVR = GA4 purchase key events ÷ sessions. Duration = avg session duration.</p>

    <div class="sec">Landing Page Funnel — Last 30 Days (GA4)</div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Page Type</th><th class="r">Sessions</th><th class="r">Engagement Rate</th><th class="r">Bounce Rate</th><th class="r">Avg Duration</th><th class="r">Purchases</th><th class="r">CVR</th></tr></thead>
      <tbody>${lpRows}</tbody>
    </table></div>
    <p class="footnote">Source: GA4. Pages grouped by type. CVR = purchases ÷ sessions.</p>

    <div class="sec">Channel Overlap Matrix — Last 30 Days (GA4)</div>
    <p style="font-size:12px;color:#666;margin:0 0 8px">Y axis = First-touch acquisition channel. X axis = Channel of return sessions. Diagonal = same-channel loyalty.</p>
    <div class="tbl-wrap"><table>
      <thead><tr><th style="font-size:10px">Acquired via →<br>Returned via ↓</th>${matrixHeader}</tr></thead>
      <tbody>${matrixRows}</tbody>
    </table></div>
    <p class="footnote">Source: GA4. Off-diagonal values = cross-channel halo effect.</p>

    <div class="sec">Daily Booking Funnel — Last 14 Days (PostHog, all channels)</div>
    <div class="chart-wrap">
      <h3>Funnel Step Conversion Rates Over Time</h3>
      <canvas id="funnelChart" height="85"></canvas>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Date</th><th class="r">Sessions</th><th class="r">Appts / Sessions</th><th class="r">Forms / Appts</th><th class="r">Purch / Forms</th><th class="r">CVR (Purch / Sessions)</th></tr></thead>
      <tbody>${dailyFunnelRows}</tbody>
    </table></div>
    <p class="footnote">Source: PostHog session-scoped CTE, all channels. CVR = purchase sessions ÷ sessions.</p>`;

  setTimeout(()=>{
    const ctx = document.getElementById('funnelChart');
    if(ctx&&labels.length){
      new Chart(ctx,{type:'line',data:{labels,datasets:[
        {label:'Appts/Sessions %',data:apptR,borderColor:'#3C3489',backgroundColor:'rgba(60,52,137,.06)',tension:.3,yAxisID:'y',pointRadius:3},
        {label:'Forms/Appts %',   data:formR,borderColor:'#085041',backgroundColor:'rgba(8,80,65,.06)',  tension:.3,yAxisID:'y',pointRadius:3},
        {label:'Purch/Forms %',   data:purchR,borderColor:'#e67e22',backgroundColor:'rgba(230,126,34,.06)',tension:.3,yAxisID:'y',pointRadius:3},
        {label:'CVR %',           data:cvrR, borderColor:'#c0392b',backgroundColor:'rgba(192,57,43,.05)',tension:.3,yAxisID:'y2',pointRadius:3,borderDash:[5,3]},
      ]},options:{responsive:true,interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'top',labels:{font:{size:11}}}},
        scales:{
          y:{type:'linear',display:true,position:'left',title:{display:true,text:'Funnel Step %'},ticks:{callback:v=>v+'%'}},
          y2:{type:'linear',display:true,position:'right',title:{display:true,text:'CVR %'},grid:{drawOnChartArea:false},ticks:{callback:v=>v+'%'}}
        }
      }});
    }
  },50);
}

// BOOTSTRAP
// ═══════════════════════════════════════════════════════════════════════════
async function loadData(){
  const url=`https://api.github.com/repos/novelrahman-dev/mm-marketing-summary/contents/data.json`;
  try{
    const res=await fetch(url,{headers:{Accept:'application/vnd.github.raw+json'}});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    $e('meta').textContent=`Generated: ${data.generated_at}`;
    renderInsightsSEM(data);
    renderInsightsSocial(data);
    renderCampaignsAdwords(data);
    renderCampaignsFacebook(data);
    renderFunnel(data);
  }catch(err){
    const msg=`<div class="error-box">⚠️ Could not load data.json<br><small>${err.message}</small><br><br>Run "pull morning data" in Claude to refresh.</div>`;
    ['insights-sem','insights-social','campaigns-adwords','campaigns-facebook','funnel'].forEach(id=>$e(id).innerHTML=msg);
  }
}
loadData();
</script>
