<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Menopause — Google Ads Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#f8f7f4;--surface:#fff;--border:rgba(0,0,0,.09);--text:#1a1a18;--muted:#6b6b67;
  --radius:10px;--purple-bg:#EEEDFE;--purple-border:#c5c3f5;--purple-text:#3C3489;
  --teal-bg:#E1F5EE;--teal-text:#085041;--amber-bg:#FAEEDA;--amber-text:#6B4C00;
  --red-bg:#FEEDED;--red-text:#8B1A1A;--green-bg:#E6F4EA;--green-text:#1A5C2A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}
header{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
header h1{font-size:15px;font-weight:700;white-space:nowrap;}
#meta{font-size:11px;color:var(--muted);white-space:nowrap;}
nav{display:flex;gap:2px;padding:10px 24px 0;border-bottom:1px solid var(--border);background:#fff;}
nav button{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:12px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:600;}
nav button.active{color:var(--text);border-bottom-color:#3C3489;}
nav button:hover:not(.active){color:var(--text);}
.tab{display:none;padding:20px 24px;}
.tab.active{display:block;}

.sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:20px 0 8px;}
.sec:first-child{margin-top:0;}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.card .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.card .val{font-size:22px;font-weight:800;line-height:1.1;}
.card .sub{font-size:10px;color:var(--muted);margin-top:4px;}

.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap;}
.tag-brand{background:var(--purple-bg);color:var(--purple-text);}
.tag-nb{background:var(--teal-bg);color:var(--teal-text);}
.tag-pmax{background:var(--amber-bg);color:var(--amber-text);}
.tag-good{background:var(--green-bg);color:var(--green-text);}
.tag-warn{background:var(--amber-bg);color:var(--amber-text);}
.tag-bad{background:var(--red-bg);color:var(--red-text);}

.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;margin-bottom:6px;}
table{width:100%;border-collapse:collapse;font-size:11.5px;}
th{background:#f5f4f1;font-weight:700;text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);}
td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.r{text-align:right;}
.footnote{font-size:10px;color:var(--muted);margin-bottom:16px;padding-left:2px;}

.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.ic{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.ic-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.ic-icon{font-size:20px;line-height:1;flex-shrink:0;}
.ic-title{font-weight:700;font-size:13px;}
.ic-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.ic ul{list-style:none;}
.ic ul li{font-size:11.5px;color:var(--text);padding:5px 0;border-bottom:1px solid var(--border);line-height:1.4;}
.ic ul li:last-child{border:none;padding-bottom:0;}
.dim{color:var(--muted);font-size:10px;}

.narrative{background:#fdfcf9;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;}
.narrative h3{font-size:12px;font-weight:700;margin-bottom:8px;}
.narrative p{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:5px;}
.narrative p:last-child{margin:0;}
.narrative strong{color:var(--text);}

.bottom-line{background:var(--purple-bg);border:1px solid var(--purple-border);border-radius:var(--radius);padding:14px 18px;}
.bl-title{font-weight:700;font-size:12px;color:var(--purple-text);margin-bottom:6px;}
.bl-body{font-size:12px;color:var(--purple-text);line-height:1.6;}

.pace-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.pace-row:last-child{border:none;}
.pace-name{width:280px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.pace-bar-bg{flex:1;background:#eee;border-radius:4px;height:8px;overflow:hidden;min-width:60px;}
.pace-bar-fill{height:8px;border-radius:4px;}
.pace-spend{width:68px;text-align:right;font-size:11px;font-weight:700;}
.pace-purch{width:60px;text-align:right;font-size:10px;color:var(--muted);}

.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:6px;}
.chart-wrap h3{font-size:12px;font-weight:700;margin-bottom:12px;}

.error-box{background:var(--red-bg);border:1px solid #f5c0c0;border-radius:var(--radius);padding:16px 20px;margin:20px 0;color:var(--red-text);}
.loading{text-align:center;padding:60px 20px;color:var(--muted);}
</style>
</head>
<body>

<header>
  <h1>🌿 Modern Menopause — Google Ads Dashboard</h1>
  <span id="meta">Loading…</span>
</header>

<nav>
  <button class="active" onclick="showTab('insights',this)">💡 Insights</button>
  <button onclick="showTab('campaigns',this)">📊 Campaigns</button>
  <button onclick="showTab('funnel',this)">🌐 Site Funnel</button>
</nav>

<div id="insights" class="tab active"><div class="loading">Loading…</div></div>
<div id="campaigns" class="tab"><div class="loading">Loading…</div></div>
<div id="funnel" class="tab"><div class="loading">Loading…</div></div>

<script>
const $e = id => document.getElementById(id);

const fmtCAD  = v => v == null ? '—' : '$' + Number(v).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtCAD2 = v => v == null ? '—' : '$' + Number(v).toFixed(2);
const fmtNum  = v => v == null ? '—' : Number(v).toLocaleString();
const fmtPct  = (v,d=2) => v == null ? '—' : Number(v).toFixed(d)+'%';

function showTab(id, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  $e(id).classList.add('active'); btn.classList.add('active');
}

function cpaTag(cpa){
  if(cpa==null) return '<span style="color:var(--muted)">—</span>';
  if(cpa<=100)  return `<span class="tag tag-good">${fmtCAD2(cpa)}</span>`;
  if(cpa<=175)  return `<span class="tag tag-warn">${fmtCAD2(cpa)}</span>`;
  return `<span class="tag tag-bad">${fmtCAD2(cpa)}</span>`;
}

function campTag(name, type){
  const l = name.toLowerCase();
  if(l.includes('[brand]')||l.includes('brand')) return '<span class="tag tag-brand">Brand</span>';
  if(type==='PERFORMANCE_MAX'||l.includes('pmax')||l.includes('[pmax]')) return '<span class="tag tag-pmax">PMax</span>';
  return '<span class="tag tag-nb">NB</span>';
}

function sc(name){ return name.replace(/_/g,' '); }

// ─── INSIGHTS ────────────────────────────────────────────────────────────────
function renderInsights(d){
  const camps = d.report1_campaigns || [];
  const totals = d.totals || {};
  const t14=totals['14d']||{}, t7=totals['7d']||{}, ty=totals.yesterday||{};
  const gp = (d.channel_funnel||[]).find(c=>c.channel==='Google Paid');
  const gCVR = gp ? (gp.purchase_sessions/gp.sessions*100).toFixed(2) : null;
  const dow = new Date(d.date_yesterday).getDay();
  const target = (dow===0||dow===6) ? 2000 : 3000;
  const pacePct = ty.cost ? ty.cost/target*100 : 0;
  const paceColor = pacePct>110?'#c0392b':pacePct>=85?'#27ae60':'#e67e22';

  const withPurch = camps.filter(c=>c.purchases_14d>0.5)
    .map(c=>({...c,cpa14:c.cost_14d/c.purchases_14d}))
    .sort((a,b)=>a.cpa14-b.cpa14);
  const best3 = withPurch.slice(0,3);
  const investigate = camps.filter(c=>c.cpa_7d&&c.cpa_7d>175).sort((a,b)=>b.cpa_7d-a.cpa_7d);
  const hrt = camps.find(c=>c.campaign.includes('HRT'));
  const hrtSpend = hrt ? hrt.cost_14d : 0;
  const brandCamp = camps.find(c=>c.campaign.toLowerCase().includes('[brand]')&&c.campaign.includes('Max_clicks'));
  const brandIS = brandCamp ? brandCamp.top_is : null;
  const best = withPurch[0], worst = withPurch[withPurch.length-1];

  // Narrative
  let lines = [];
  if(t7.cpa) lines.push(`<strong>7d CPA is ${fmtCAD2(t7.cpa)}</strong> — ${t7.cpa<=175?'✅ within':'⚠️ above'} the $175 target. 14d blended CPA is <strong>${fmtCAD2(t14.cpa)}</strong> across <strong>${Math.round(t14.purchases||0)} purchases</strong>.`);
  lines.push(`Yesterday: <strong>${fmtCAD(ty.cost)}</strong> spend (${pacePct.toFixed(0)}% of ${fmtCAD(target)} ${(dow===0||dow===6)?'weekend':'weekday'} target), <strong>${ty.purchases!=null?ty.purchases.toFixed(1):'—'} purchases</strong> at <strong>${fmtCAD2(ty.cpa)} CPA</strong>.`);
  if(best&&worst&&best.campaign!==worst.campaign) lines.push(`Best 14d: <strong>${sc(best.campaign).substring(0,44)}</strong> at <strong>${fmtCAD2(best.cpa14)} CPA</strong>. Worst: <strong>${sc(worst.campaign).substring(0,40)}</strong> at <strong>${fmtCAD2(worst.cpa14)} CPA</strong>.`);
  if(hrtSpend>0) lines.push(`🔴 <strong>HRT campaign has spent ${fmtCAD(hrtSpend)} (14d)</strong> — LP gated until Jul 6, pause immediately.`);
  else if(investigate.length>0) lines.push(`⚠️ <strong>${investigate.length} campaign${investigate.length>1?'s':''}</strong> running above $175 CPA (7d) — see Investigate card.`);
  else lines.push(`✅ No structural flags. All campaigns within acceptable parameters.`);

  const campPaceRows = camps.filter(c=>c.yest_cost>0)
    .sort((a,b)=>b.yest_cost-a.yest_cost)
    .map(c=>{
      const pct = Math.min(c.yest_cost/target*100,120);
      const col = pct>100?'#c0392b':pct>60?'#3C3489':'#aaa';
      return `<div class="pace-row">
        <div class="pace-name" title="${c.campaign}">${sc(c.campaign).substring(0,44)}</div>
        <div class="pace-bar-bg"><div class="pace-bar-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="pace-spend" style="color:${col}">${fmtCAD(c.yest_cost)}</div>
        <div class="pace-purch">${c.yest_purchases>0?c.yest_purchases.toFixed(1)+' purch':'0 purch'}</div>
      </div>`;
    }).join('');

  $e('insights').innerHTML = `
    <div class="sec">Account Snapshot — ${d.date_yesterday}</div>
    <div class="cards">
      <div class="card"><div class="lbl">Yesterday Spend</div><div class="val">${fmtCAD(ty.cost)}</div><div class="sub">${pacePct.toFixed(0)}% of ${fmtCAD(target)} target</div></div>
      <div class="card"><div class="lbl">Yesterday CPA</div><div class="val">${fmtCAD2(ty.cpa)}</div><div class="sub">[gtag] purchase</div></div>
      <div class="card"><div class="lbl">7d CPA</div><div class="val">${fmtCAD2(t7.cpa)}</div><div class="sub">target ≤ $175</div></div>
      <div class="card"><div class="lbl">14d Spend</div><div class="val">${fmtCAD(t14.cost)}</div><div class="sub">${fmtNum(Math.round(t14.purchases||0))} purchases</div></div>
      <div class="card"><div class="lbl">14d CPA</div><div class="val">${fmtCAD2(t14.cpa)}</div><div class="sub">blended all campaigns</div></div>
      <div class="card"><div class="lbl">Google Paid CVR</div><div class="val">${gCVR!=null?gCVR+'%':'—'}</div><div class="sub">purchases / sessions (30d)</div></div>
    </div>

    <div class="sec">What to Look For Today</div>
    <div class="narrative">
      <h3>📋 Morning Briefing — ${d.date_yesterday}</h3>
      ${lines.map(l=>`<p>${l}</p>`).join('')}
    </div>

    <div class="sec">Yesterday Spend Pacing vs ${fmtCAD(target)} ${(dow===0||dow===6)?'Weekend':'Weekday'} Target</div>
    <div class="tbl-wrap" style="padding:10px 14px;">${campPaceRows}</div>

    <div class="sec">Action Cards</div>
    <div class="insight-grid">
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">🚀</span><div><div class="ic-title">Double Down</div><div class="ic-sub">Lowest 14d CPA — scale these</div></div></div>
        <ul>${best3.length?best3.map(c=>`<li><strong>${sc(c.campaign).substring(0,44)}</strong><br><span class="dim">14d CPA: <strong>${fmtCAD2(c.cpa14)}</strong> · Spend: ${fmtCAD(c.cost_14d)} · Purchases: ${c.purchases_14d.toFixed(1)}</span></li>`).join(''):'<li>No data</li>'}</ul>
      </div>
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">⚠️</span><div><div class="ic-title">Investigate</div><div class="ic-sub">7d CPA above $175 — review or cut</div></div></div>
        <ul>${investigate.length?investigate.map(c=>`<li>${cpaTag(c.cpa_7d)} <strong>${sc(c.campaign).substring(0,36)}</strong><br><span class="dim">7d spend: ${fmtCAD(c.cost_7d)} · 14d CPA: ${fmtCAD2(c.cpa_14d)}</span></li>`).join(''):'<li>✅ All campaigns within target</li>'}</ul>
      </div>
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">🏆</span><div><div class="ic-title">Best Performer</div><div class="ic-sub">14d lowest CPA with volume</div></div></div>
        <ul>${best?`<li><strong>${sc(best.campaign)}</strong></li><li><span class="dim">14d CPA</span> ${cpaTag(best.cpa14)}</li><li><span class="dim">14d Spend</span> <strong>${fmtCAD(best.cost_14d)}</strong></li><li><span class="dim">Purchases</span> <strong>${best.purchases_14d.toFixed(1)}</strong></li>`:'<li>No data</li>'}</ul>
      </div>
      <div class="ic">
        <div class="ic-head"><span class="ic-icon">🚨</span><div><div class="ic-title">Structural Flags</div><div class="ic-sub">Always-on checks</div></div></div>
        <ul>
          <li>${hrtSpend>0?`🔴 <strong>HRT spending ${fmtCAD(hrtSpend)} (14d)</strong> — LP gated Jul 6, PAUSE`:'✅ HRT not spending (correct)'}</li>
          <li>${brandIS!=null&&brandIS<80?`🔴 Brand Top IS: <strong>${brandIS.toFixed(1)}%</strong> — below 80%`:brandIS!=null?`✅ Brand Top IS: <strong>${brandIS.toFixed(1)}%</strong>`:'— Brand IS: no yesterday data'}</li>
          <li>${worst&&worst.cpa14>300?`📉 Worst: <strong>${sc(worst.campaign).substring(0,34)}</strong> ${fmtCAD2(worst.cpa14)} CPA (14d)`:'✅ No campaigns above $300 CPA (14d)'}</li>
        </ul>
      </div>
    </div>

    <div class="bottom-line">
      <div class="bl-title">Bottom Line</div>
      <div class="bl-body">Yesterday: <strong>${fmtCAD(ty.cost)}</strong> spend, <strong>${ty.purchases!=null?ty.purchases.toFixed(1):'—'} purchases</strong>, <strong>${fmtCAD2(ty.cpa)} CPA</strong>. 7d CPA <strong>${fmtCAD2(t7.cpa)}</strong> — ${t7.cpa&&t7.cpa<=175?'✅ on target':t7.cpa&&t7.cpa<=225?'⚠️ watch closely':'🔴 above target'}. 14d: <strong>${fmtCAD(t14.cost)}</strong> spend, <strong>${fmtNum(Math.round(t14.purchases||0))} purchases</strong>, <strong>${fmtCAD2(t14.cpa)}</strong> CPA.${hrtSpend>0?'<br>🔴 <strong>HRT campaign spending — PAUSE IMMEDIATELY.</strong>':''}</div>
    </div>`;
}

// ─── CAMPAIGNS ────────────────────────────────────────────────────────────────
function renderCampaigns(d){
  const camps = d.report1_campaigns || [];
  const totals = d.totals || {};
  const t14=totals['14d']||{}, t7=totals['7d']||{}, ty=totals.yesterday||{};
  const daily = d.daily||[];

  // ── Full shared column header (same across all 3 tables)
  const fullHdr = `
    <th class="r">Impr.</th>
    <th class="r">Clicks</th>
    <th class="r">CTR</th>
    <th class="r">Avg CPC</th>
    <th class="r">Spend</th>
    <th class="r">Appts/Clicks</th>
    <th class="r">Forms/Appts</th>
    <th class="r">Purch/Forms</th>
    <th class="r">ROAS</th>
    <th class="r">Top IS</th>
    <th class="r">Bgt Lost IS</th>
    <th class="r">Purchases*</th>
    <th class="r">CPA</th>`;

  // ── Account Summary (3 rows — funnel/IS/ROAS show — at account level) ──
  const periods = [
    {label:'Yesterday',    r:ty},
    {label:'Last 7 Days',  r:t7},
    {label:'Last 14 Days', r:t14},
  ];
  const summaryRows = periods.map(p=>{
    const r=p.r;
    const fn=r.funnel||{};
    return `<tr>
      <td><strong>${p.label}</strong></td>
      <td class="r">${fmtNum(r.impressions)}</td>
      <td class="r">${fmtNum(r.clicks)}</td>
      <td class="r">${r.ctr!=null?r.ctr.toFixed(2)+'%':'—'}</td>
      <td class="r">${r.cpc!=null?'$'+r.cpc.toFixed(2):'—'}</td>
      <td class="r">${fmtCAD(r.cost)}</td>
      <td class="r">${fn.appts_per_click!=null?fn.appts_per_click.toFixed(1)+'%':'—'}</td>
      <td class="r">${fn.forms_per_appt!=null?fn.forms_per_appt.toFixed(1)+'%':'—'}</td>
      <td class="r">${fn.purch_per_form!=null?fn.purch_per_form.toFixed(1)+'%':'—'}</td>
      <td class="r">${r.roas!=null?r.roas.toFixed(2)+'x':'—'}</td>
      <td class="r">—</td>
      <td class="r">—</td>
      <td class="r">${r.purchases!=null?r.purchases.toFixed(1):'—'}</td>
      <td class="r">${cpaTag(r.cpa)}</td>
    </tr>`;
  }).join('');

  // ── Campaign table — full cols + 3 CPA columns ──
  const campRows = camps.map(c=>`<tr>
    <td style="max-width:240px;overflow:hidden;text-overflow:ellipsis;" title="${c.campaign}">
      ${campTag(c.campaign,c.type)} ${sc(c.campaign).substring(0,36)}
    </td>
    <td class="r">${fmtNum(c.yest_impressions||0)}</td>
    <td class="r">${fmtNum(c.yest_clicks||0)}</td>
    <td class="r">${c.yest_ctr!=null?c.yest_ctr.toFixed(1)+'%':'—'}</td>
    <td class="r">${c.yest_cpc!=null?'$'+c.yest_cpc.toFixed(2):'—'}</td>
    <td class="r">${fmtCAD(c.yest_cost)}</td>
    <td class="r">${c.funnel_appts_per_click!=null?c.funnel_appts_per_click.toFixed(1)+'%':'—'}</td>
    <td class="r">${c.funnel_forms_per_appt!=null?c.funnel_forms_per_appt.toFixed(1)+'%':'—'}</td>
    <td class="r">${c.funnel_purchases_per_form!=null?c.funnel_purchases_per_form.toFixed(1)+'%':'—'}</td>
    <td class="r">${c.yest_roas!=null?c.yest_roas.toFixed(2)+'x':'—'}</td>
    <td class="r">${c.top_is!=null?c.top_is.toFixed(1)+'%':'—'}</td>
    <td class="r">${c.budget_lost_is!=null?c.budget_lost_is.toFixed(1)+'%':'—'}</td>
    <td class="r">${c.yest_purchases!=null?c.yest_purchases.toFixed(1):'—'}</td>
    <td class="r">${cpaTag(c.yest_cpa)}</td>
    <td class="r">${cpaTag(c.cpa_7d)}</td>
    <td class="r">${cpaTag(c.cpa_14d)}</td>
  </tr>`).join('');

  // ── Daily Breakdown — full cols with funnel rates from PostHog daily14_funnel ──
  const dailyRows = daily.map(r=>`<tr>
    <td>${r.date}</td>
    <td class="r">${fmtNum(r.impressions)}</td>
    <td class="r">${fmtNum(r.clicks)}</td>
    <td class="r">${r.clicks&&r.impressions?(r.clicks/r.impressions*100).toFixed(2)+'%':'—'}</td>
    <td class="r">${r.clicks&&r.cost?'$'+(r.cost/r.clicks).toFixed(2):'—'}</td>
    <td class="r">${fmtCAD(r.cost)}</td>
    <td class="r">${r.appts_per_click!=null?r.appts_per_click.toFixed(1)+'%':'—'}</td>
    <td class="r">${r.forms_per_appt!=null?r.forms_per_appt.toFixed(1)+'%':'—'}</td>
    <td class="r">${r.purch_per_form!=null?r.purch_per_form.toFixed(1)+'%':'—'}</td>
    <td class="r">${r.roas!=null?r.roas.toFixed(2)+'x':'—'}</td>
    <td class="r">—</td>
    <td class="r">—</td>
    <td class="r">${r.purchases!=null?r.purchases.toFixed(1):'—'}</td>
    <td class="r">${cpaTag(r.cpa)}</td>
  </tr>`).join('');

  $e('campaigns').innerHTML = `
    <div class="sec">Account Summary</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Period</th>
          ${fullHdr}
        </tr></thead>
        <tbody>${summaryRows}</tbody>
      </table>
    </div>
    <p class="footnote">*[gtag] purchase only — not raw conversions field</p>

    <div class="sec">Campaign Breakdown — Yesterday (${d.date_yesterday})</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Campaign</th>
          <th class="r">Impr.</th>
          <th class="r">Clicks</th>
          <th class="r">CTR</th>
          <th class="r">CPC</th>
          <th class="r">Cost</th>
          <th class="r">Appts/Clicks</th>
          <th class="r">Forms/Appts</th>
          <th class="r">Purch/Forms</th>
          <th class="r">ROAS</th>
          <th class="r">Top IS</th>
          <th class="r">Bgt Lost IS</th>
          <th class="r">Purchases*</th>
          <th class="r">CPA Yest</th>
          <th class="r">CPA 7d</th>
          <th class="r">CPA 14d</th>
        </tr></thead>
        <tbody>${campRows}</tbody>
      </table>
    </div>
    <p class="footnote">Funnel columns = PostHog 14d (utm_source=google_paid) · ROAS = Windsor ÷ 100 · *[gtag] purchase only</p>

    <div class="sec">Daily Breakdown — Last 14 Days</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Date</th>
          ${fullHdr}
        </tr></thead>
        <tbody>${dailyRows}</tbody>
      </table>
    </div>
    <p class="footnote">Funnel columns from PostHog events (utm_source=google), clicks from Windsor. IS and ROAS are campaign-level only. *[gtag] purchase only</p>`;
}

// ─── SITE FUNNEL ──────────────────────────────────────────────────────────────
function renderFunnel(d){
  const channels = d.channel_funnel || [];
  const daily14  = d.daily14_funnel||[];

  const chanRows = channels.map(c=>{
    const apptR  = c.sessions>0?(c.appt_sessions/c.sessions*100).toFixed(1):'—';
    const formR  = c.appt_sessions>0?(c.form_sessions/c.appt_sessions*100).toFixed(1):'—';
    const purchR = c.form_sessions>0?(c.purchase_sessions/c.form_sessions*100).toFixed(1):'—';
    const cvr    = c.sessions>0?(c.purchase_sessions/c.sessions*100).toFixed(2):'—';
    return `<tr>
      <td><strong>${c.channel}</strong></td>
      <td class="r">${fmtNum(c.sessions)}</td>
      <td class="r">${apptR!=='—'?apptR+'%':'—'}</td>
      <td class="r">${formR!=='—'?formR+'%':'—'}</td>
      <td class="r">${purchR!=='—'?purchR+'%':'—'}</td>
      <td class="r"><strong>${cvr!=='—'?cvr+'%':'—'}</strong></td>
    </tr>`;
  }).join('');

  const dailyFunnelRows = daily14.map(r=>{
    const apptR  = r.sessions>0?(r.appt_sessions/r.sessions*100).toFixed(1):'—';
    const formR  = r.appt_sessions>0?(r.form_sessions/r.appt_sessions*100).toFixed(1):'—';
    const purchR = r.form_sessions>0?(r.purchase_sessions/r.form_sessions*100).toFixed(1):'—';
    const cvr    = r.sessions>0?(r.purchase_sessions/r.sessions*100).toFixed(2):'—';
    return `<tr>
      <td>${r.date}</td>
      <td class="r">${fmtNum(r.sessions)}</td>
      <td class="r">${apptR!=='—'?apptR+'%':'—'}</td>
      <td class="r">${formR!=='—'?formR+'%':'—'}</td>
      <td class="r">${purchR!=='—'?purchR+'%':'—'}</td>
      <td class="r"><strong>${cvr!=='—'?cvr+'%':'—'}</strong></td>
    </tr>`;
  }).join('');

  const labels = daily14.map(r=>r.date.slice(5));
  const apptR  = daily14.map(r=>r.sessions>0?+(r.appt_sessions/r.sessions*100).toFixed(2):0);
  const formR  = daily14.map(r=>r.appt_sessions>0?+(r.form_sessions/r.appt_sessions*100).toFixed(2):0);
  const purchR = daily14.map(r=>r.form_sessions>0?+(r.purchase_sessions/r.form_sessions*100).toFixed(2):0);
  const cvrR   = daily14.map(r=>r.sessions>0?+(r.purchase_sessions/r.sessions*100).toFixed(2):0);

  $e('funnel').innerHTML = `
    <div class="sec">Channel Funnel — Last 30 Days (session-scoped)</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Channel</th>
          <th class="r">Sessions</th>
          <th class="r">Appts / Sessions</th>
          <th class="r">Forms / Appts</th>
          <th class="r">Purch / Forms</th>
          <th class="r">CVR (Purch / Sessions)</th>
        </tr></thead>
        <tbody>${chanRows}</tbody>
      </table>
    </div>
    <p class="footnote">Session-scoped: each session attributed to its entry channel. CVR = purchase sessions ÷ sessions.</p>

    <div class="sec">Daily Funnel Rates — Last 14 Days</div>
    <div class="chart-wrap">
      <h3>Funnel Step Conversion Rates Over Time</h3>
      <canvas id="funnelChart" height="85"></canvas>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Date</th>
          <th class="r">Sessions</th>
          <th class="r">Appts / Sessions</th>
          <th class="r">Forms / Appts</th>
          <th class="r">Purch / Forms</th>
          <th class="r">CVR (Purch / Sessions)</th>
        </tr></thead>
        <tbody>${dailyFunnelRows}</tbody>
      </table>
    </div>
    <p class="footnote">All channels combined. CVR = purchase sessions ÷ sessions.</p>`;

  setTimeout(()=>{
    const ctx = document.getElementById('funnelChart');
    if(ctx&&labels.length){
      new Chart(ctx,{type:'line',data:{labels,datasets:[
        {label:'Appts/Sessions %',data:apptR,borderColor:'#3C3489',backgroundColor:'rgba(60,52,137,.06)',tension:.3,yAxisID:'y',pointRadius:3},
        {label:'Forms/Appts %',   data:formR,borderColor:'#085041',backgroundColor:'rgba(8,80,65,.06)',  tension:.3,yAxisID:'y',pointRadius:3},
        {label:'Purch/Forms %',   data:purchR,borderColor:'#e67e22',backgroundColor:'rgba(230,126,34,.06)',tension:.3,yAxisID:'y',pointRadius:3},
        {label:'CVR %',           data:cvrR, borderColor:'#c0392b',backgroundColor:'rgba(192,57,43,.05)',tension:.3,yAxisID:'y2',pointRadius:3,borderDash:[5,3]},
      ]},options:{responsive:true,interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'top',labels:{font:{size:11}}}},
        scales:{y:{type:'linear',position:'left',title:{display:true,text:'Funnel Step %'}},
                y2:{type:'linear',position:'right',title:{display:true,text:'CVR %'},grid:{drawOnChartArea:false}}}}});
    }
  },50);
}

// ─── Bootstrap ────────────────────────────────────────────────────────────────
async function loadData(){
  const url=`https://raw.githubusercontent.com/novelrahman-dev/mm-google-ads-summary/main/data.json?t=${Date.now()}`;
  try{
    const res=await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    $e('meta').textContent=`Generated: ${data.generated_at}`;
    renderInsights(data);
    renderCampaigns(data);
    renderFunnel(data);
  }catch(err){
    const msg=`<div class="error-box">⚠️ Could not load data.json<br><small>${err.message}</small><br><br>Run "pull morning data" in Claude to refresh.</div>`;
    ['insights','campaigns','funnel'].forEach(id=>$e(id).innerHTML=msg);
  }
}
loadData();
</script>
</body>
