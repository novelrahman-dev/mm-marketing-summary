<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Menopause — Google Ads Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:#f8f7f4;--surface:#ffffff;--border:rgba(0,0,0,0.10);--border-strong:rgba(0,0,0,0.18);
    --text:#1a1a18;--muted:#6b6b67;--hint:#9b9b96;--radius:10px;
    --purple-bg:#EEEDFE;--purple-text:#3C3489;--teal-bg:#E1F5EE;--teal-text:#085041;
    --amber-bg:#FAEEDA;--amber-text:#6B4C00;--red-bg:#FEEDED;--red-text:#8B1A1A;
    --green-bg:#E6F4EA;--green-text:#1A5C2A;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); font-size:14px; }
  header { background:#fff; border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; }
  header h1 { font-size:16px; font-weight:600; }
  #data-date { font-size:12px; color:var(--muted); }
  nav { display:flex; gap:4px; padding:12px 24px 0; border-bottom:1px solid var(--border); background:#fff; }
  nav button { padding:8px 16px; border:none; background:none; cursor:pointer; font-size:13px; color:var(--muted); border-bottom:2px solid transparent; margin-bottom:-1px; font-weight:500; }
  nav button.active { color:var(--text); border-bottom-color:#3C3489; }
  .tab { display:none; padding:24px; }
  .tab.active { display:block; }
  .loading { text-align:center; padding:60px; color:var(--muted); }
  .error-msg { text-align:center; padding:40px; color:#8B1A1A; background:var(--red-bg); border-radius:var(--radius); margin:24px; }

  /* ── Cards ── */
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .card .label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:6px; }
  .card .value { font-size:22px; font-weight:700; }
  .card .sub { font-size:11px; color:var(--muted); margin-top:4px; }

  /* ── Tables ── */
  .table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:auto; margin-bottom:20px; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th { background:#f5f4f1; font-weight:600; text-align:left; padding:9px 12px; border-bottom:1px solid var(--border); white-space:nowrap; font-size:11px; text-transform:uppercase; letter-spacing:.3px; color:var(--muted); }
  td { padding:9px 12px; border-bottom:1px solid var(--border); white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:#fafaf8; }
  .num { text-align:right; }
  .tag { display:inline-block; padding:2px 7px; border-radius:4px; font-size:11px; font-weight:600; }
  .tag.brand { background:var(--purple-bg); color:var(--purple-text); }
  .tag.nb { background:var(--teal-bg); color:var(--teal-text); }
  .tag.warn { background:var(--amber-bg); color:var(--amber-text); }
  .tag.bad { background:var(--red-bg); color:var(--red-text); }
  .tag.good { background:var(--green-bg); color:var(--green-text); }

  /* ── Insights ── */
  .section-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin-bottom:12px; margin-top:4px; }
  .insight-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .insight-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
  .insight-card .ic-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .insight-card .ic-icon { font-size:18px; }
  .insight-card .ic-title { font-weight:700; font-size:13px; }
  .insight-card .ic-sub { font-size:11px; color:var(--muted); }
  .insight-card ul { list-style:none; }
  .insight-card ul li { font-size:12.5px; color:var(--muted); padding:3px 0; border-bottom:1px solid var(--border); }
  .insight-card ul li:last-child { border:none; }
  .insight-card ul li strong { color:var(--text); }
  .bottom-line { background:var(--purple-bg); border:1px solid #c5c3f5; border-radius:var(--radius); padding:16px 20px; }
  .bottom-line .bl-title { font-weight:700; font-size:13px; color:var(--purple-text); margin-bottom:6px; }
  .bottom-line p { font-size:13px; color:var(--purple-text); line-height:1.5; }
  .pacing-bar-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:20px; }
  .pacing-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .pacing-name { width:260px; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pacing-bar-bg { flex:1; background:#eee; border-radius:4px; height:10px; overflow:hidden; }
  .pacing-bar-fill { height:10px; border-radius:4px; }
  .pacing-pct { width:45px; text-align:right; font-size:12px; font-weight:600; }
  .pacing-spend { width:70px; text-align:right; font-size:11px; color:var(--muted); }

  /* ── Chart ── */
  .chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:20px; }
  .chart-wrap h3 { font-size:13px; font-weight:700; margin-bottom:12px; }

  @media (max-width:640px) { .insight-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
  <h1>🌿 Modern Menopause — Google Ads Dashboard</h1>
  <span id="data-date">Loading...</span>
</header>

<nav>
  <button class="active" onclick="showTab('insights',this)">💡 Insights</button>
  <button onclick="showTab('campaigns',this)">📊 Campaigns</button>
  <button onclick="showTab('funnel',this)">🌐 Site Funnel</button>
</nav>

<div id="insights" class="tab active"><div class="loading">Loading data…</div></div>
<div id="campaigns" class="tab"><div class="loading">Loading data…</div></div>
<div id="funnel" class="tab"><div class="loading">Loading data…</div></div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = {
  cad: v => v == null ? '—' : '$' + Number(v).toLocaleString('en-CA',{minimumFractionDigits:0,maximumFractionDigits:0}),
  pct: v => v == null ? '—' : (v*100).toFixed(1)+'%',
  pct1: v => v == null ? '—' : Number(v).toFixed(1)+'%',
  num: v => v == null ? '—' : Number(v).toLocaleString(),
  dec: (v,d=2) => v == null ? '—' : Number(v).toFixed(d),
};

function showTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function typeTag(name) {
  const n = (name||'').toLowerCase();
  if (n.includes('[brand]') || n.includes('brand')) return '<span class="tag brand">Brand</span>';
  return '<span class="tag nb">NB</span>';
}

function cpaColor(cpa) {
  if (cpa == null || cpa === 0) return '';
  if (cpa <= 100) return 'good';
  if (cpa <= 150) return 'warn';
  return 'bad';
}

// ── Render helpers ────────────────────────────────────────────────────────────
function renderInsights(d) {
  const campaigns = d.campaigns || [];
  const daily = d.daily || [];
  const channels = d.channels || [];

  // Total spend (today = most recent daily row)
  const totalSpend30 = campaigns.reduce((s,c) => s + (c.spend||0), 0);
  const totalClicks30 = campaigns.reduce((s,c) => s + (c.clicks||0), 0);
  const totalConversions30 = campaigns.reduce((s,c) => s + (c.conversions||0), 0);
  const totalCPA = totalConversions30 > 0 ? totalSpend30 / totalConversions30 : null;

  // Yesterday row
  const yesterday = daily.length > 0 ? daily[daily.length-1] : null;

  // Brand vs NB split
  const brandCamps = campaigns.filter(c => (c.campaign||'').toLowerCase().includes('brand'));
  const nbCamps = campaigns.filter(c => !(c.campaign||'').toLowerCase().includes('brand'));
  const brandSpend = brandCamps.reduce((s,c)=>s+(c.spend||0),0);
  const nbSpend = nbCamps.reduce((s,c)=>s+(c.spend||0),0);

  // Top performer by ROAS
  const withRoas = campaigns.filter(c=>c.roas>0).sort((a,b)=>b.roas-a.roas);
  const topRoas = withRoas[0];

  // Worst CPA (non-zero conversions)
  const withCPA = campaigns.filter(c=>c.conversions>0).sort((a,b)=>{
    const ca = a.spend/a.conversions, cb = b.spend/b.conversions;
    return cb - ca;
  });
  const worstCPA = withCPA[0];
  const bestCPA = withCPA[withCPA.length-1];

  // Funnel CVR (PostHog — 30d channel total)
  const allClicks = channels.reduce((s,c)=>s+(c.clicks||0),0);
  const allPayments = channels.reduce((s,c)=>s+(c.payments||0),0);
  const overallCVR = allClicks > 0 ? allPayments/allClicks : null;

  // Double down = Brand (always) + top NB by ROAS
  const topNB = nbCamps.filter(c=>c.roas>0).sort((a,b)=>b.roas-a.roas)[0];

  // Pacing bars (spend as % of 30d budget proxy — use 30d avg daily * 30)
  const dailyAvg = totalSpend30 / 30;
  const pacingData = campaigns.filter(c=>c.spend>0).sort((a,b)=>b.spend-a.spend).slice(0,8).map(c => ({
    name: c.campaign,
    spend: c.spend,
    pct: Math.min(100, (c.spend / (dailyAvg * 30 / campaigns.filter(x=>x.spend>0).length)) * 100)
  }));

  // Alerts
  const alerts = [];
  campaigns.forEach(c => {
    if (c.conversions > 0) {
      const cpa = c.spend / c.conversions;
      if (cpa > 150) alerts.push({ name: c.campaign, cpa, type:'bad' });
      else if (cpa > 100) alerts.push({ name: c.campaign, cpa, type:'warn' });
    }
  });

  const el = document.getElementById('insights');
  el.innerHTML = `
    <div class="cards">
      <div class="card"><div class="label">30d Spend</div><div class="value">${fmt.cad(totalSpend30)}</div><div class="sub">CAD</div></div>
      <div class="card"><div class="label">30d Purchases</div><div class="value">${fmt.num(Math.round(totalConversions30))}</div><div class="sub">[gtag] purchase</div></div>
      <div class="card"><div class="label">30d CPA</div><div class="value">${fmt.cad(totalCPA)}</div><div class="sub">Target ≤ $100</div></div>
      <div class="card"><div class="label">30d Clicks</div><div class="value">${fmt.num(totalClicks30)}</div><div class="sub">Google Ads</div></div>
      <div class="card"><div class="label">Site CVR</div><div class="value">${overallCVR ? (overallCVR*100).toFixed(2)+'%' : '—'}</div><div class="sub">Clicks → Payment (PostHog)</div></div>
    </div>

    <div class="section-title">Spend Pacing — 30d Campaigns</div>
    <div class="pacing-bar-wrap">
      ${pacingData.map(p => {
        const color = p.pct > 110 ? '#c0392b' : p.pct > 90 ? '#27ae60' : '#3C3489';
        return `<div class="pacing-row">
          <div class="pacing-name" title="${p.name}">${p.name}</div>
          <div class="pacing-bar-bg"><div class="pacing-bar-fill" style="width:${Math.min(p.pct,100)}%;background:${color}"></div></div>
          <div class="pacing-pct" style="color:${color}">${p.pct.toFixed(0)}%</div>
          <div class="pacing-spend">${fmt.cad(p.spend)}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">Action Items</div>
    <div class="insight-grid">
      <div class="insight-card">
        <div class="ic-header"><span class="ic-icon">🚀</span><div><div class="ic-title">Double Down</div><div class="ic-sub">Highest ROAS — push budget here</div></div></div>
        <ul>
          ${brandCamps.slice(0,1).map(c=>`<li>✅ <strong>${c.campaign.replace(/_/g,' ')}</strong> — Brand volume, stable ROAS ${fmt.dec(c.roas)}x</li>`).join('')}
          ${topNB ? `<li>✅ <strong>${topNB.campaign.replace(/_/g,' ')}</strong> — Best NB ROAS ${fmt.dec(topNB.roas)}x, CPA ${fmt.cad(topNB.spend/Math.max(topNB.conversions,0.01))}</li>` : ''}
        </ul>
      </div>
      <div class="insight-card">
        <div class="ic-header"><span class="ic-icon">⚠️</span><div><div class="ic-title">Investigate</div><div class="ic-sub">CPA above threshold</div></div></div>
        <ul>
          ${alerts.length === 0 ? '<li>✅ All campaigns within CPA targets</li>' :
            alerts.map(a=>`<li><span class="tag ${a.type}">${a.type==='bad'?'>$150':'>$100'}</span> <strong>${a.name.replace(/_/g,' ')}</strong> — ${fmt.cad(a.cpa)} CPA</li>`).join('')
          }
        </ul>
      </div>
      <div class="insight-card">
        <div class="ic-header"><span class="ic-icon">🏆</span><div><div class="ic-title">Top Performer</div><div class="ic-sub">Best ROAS campaign</div></div></div>
        <ul>
          ${topRoas ? `<li><strong>${topRoas.campaign.replace(/_/g,' ')}</strong></li>
            <li>ROAS: <strong>${fmt.dec(topRoas.roas)}x</strong></li>
            <li>Spend: <strong>${fmt.cad(topRoas.spend)}</strong></li>
            <li>Conversions: <strong>${fmt.dec(topRoas.conversions,1)}</strong></li>` : '<li>No data</li>'}
        </ul>
      </div>
      <div class="insight-card">
        <div class="ic-header"><span class="ic-icon">📉</span><div><div class="ic-title">Watch</div><div class="ic-sub">Highest CPA with conversions</div></div></div>
        <ul>
          ${worstCPA ? `<li><strong>${worstCPA.campaign.replace(/_/g,' ')}</strong></li>
            <li>CPA: <strong class="tag ${cpaColor(worstCPA.spend/worstCPA.conversions)}">${fmt.cad(worstCPA.spend/worstCPA.conversions)}</strong></li>
            <li>Spend: <strong>${fmt.cad(worstCPA.spend)}</strong></li>
            <li>Conversions: <strong>${fmt.dec(worstCPA.conversions,1)}</strong></li>` : '<li>No data</li>'}
        </ul>
      </div>
    </div>

    <div class="bottom-line">
      <div class="bl-title">📋 Bottom Line</div>
      <p>
        30-day spend <strong>${fmt.cad(totalSpend30)}</strong> across ${campaigns.filter(c=>c.spend>0).length} active campaigns.
        Brand accounts for <strong>${fmt.pct1(totalSpend30>0?brandSpend/totalSpend30*100:0)}</strong> of spend.
        Overall CPA is <strong>${fmt.cad(totalCPA)}</strong> — ${totalCPA && totalCPA <= 100 ? '✅ on target' : totalCPA && totalCPA <= 150 ? '⚠️ above $100 target — monitor' : '🔴 above $150 — investigate'}.
        Site conversion rate: <strong>${overallCVR ? (overallCVR*100).toFixed(2)+'%' : 'N/A'}</strong> (PostHog, last 30d).
      </p>
    </div>
  `;
}

function renderCampaigns(d) {
  const campaigns = d.campaigns || [];
  const daily = d.daily || [];
  const agg14 = d.agg14 || [];
  const agg30 = d.agg30 || [];

  // Map agg14/agg30 by campaign
  const map14 = {};
  agg14.forEach(r => map14[r.campaign] = r);
  const map30 = {};
  agg30.forEach(r => map30[r.campaign] = r);

  const rows = campaigns.map(c => {
    const r14 = map14[c.campaign] || {};
    const r30 = map30[c.campaign] || {};
    const cpa30 = c.conversions > 0 ? c.spend/c.conversions : null;
    const cpaClass = cpaColor(cpa30);
    return `<tr>
      <td>${c.campaign.replace(/_/g,' ')} ${typeTag(c.campaign)}</td>
      <td class="num">${fmt.cad(c.spend)}</td>
      <td class="num">${fmt.num(c.clicks)}</td>
      <td class="num">${c.impressions ? fmt.num(c.impressions) : '—'}</td>
      <td class="num">${fmt.dec(c.roas,2)}x</td>
      <td class="num">${fmt.dec(c.conversions,1)}</td>
      <td class="num"><span class="tag ${cpaClass}">${fmt.cad(cpa30)}</span></td>
      <td class="num">${r14.spend ? fmt.cad(r14.spend) : '—'}</td>
      <td class="num">${r30.spend ? fmt.cad(r30.spend) : '—'}</td>
    </tr>`;
  }).join('');

  // Daily table (last 14 days)
  const recentDaily = daily.slice(-14);
  const dailyRows = recentDaily.map(r => `<tr>
    <td>${r.date}</td>
    <td class="num">${fmt.cad(r.spend)}</td>
    <td class="num">${fmt.num(r.clicks)}</td>
    <td class="num">${fmt.dec(r.conversions,1)}</td>
    <td class="num">${r.conversions > 0 ? fmt.cad(r.spend/r.conversions) : '—'}</td>
    <td class="num">${fmt.dec(r.roas,2)}x</td>
  </tr>`).join('');

  document.getElementById('campaigns').innerHTML = `
    <div class="section-title">Campaign Performance — Last 30 Days</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Campaign</th><th class="num">Spend</th><th class="num">Clicks</th>
          <th class="num">Impr.</th><th class="num">ROAS</th>
          <th class="num">Conv.</th><th class="num">CPA</th>
          <th class="num">14d Spend</th><th class="num">30d Spend</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="section-title">Daily Breakdown — Last 14 Days</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Date</th><th class="num">Spend</th><th class="num">Clicks</th>
          <th class="num">Conv.</th><th class="num">CPA</th><th class="num">ROAS</th>
        </tr></thead>
        <tbody>${dailyRows}</tbody>
      </table>
    </div>
  `;
}

function renderFunnel(d) {
  const channels = d.channels || [];
  const daily14 = d.daily14 || [];

  const channelRows = channels.map(c => {
    const cvr = c.clicks > 0 ? c.payments/c.clicks : null;
    const formRate = c.clicks > 0 ? c.forms/c.clicks : null;
    return `<tr>
      <td>${c.utm_source || c.channel || 'Unknown'}</td>
      <td class="num">${fmt.num(c.clicks)}</td>
      <td class="num">${fmt.num(c.cta_clicks)}</td>
      <td class="num">${fmt.num(c.forms)}</td>
      <td class="num">${fmt.num(c.payments)}</td>
      <td class="num">${fmt.pct(formRate)}</td>
      <td class="num"><strong>${fmt.pct(cvr)}</strong></td>
    </tr>`;
  }).join('');

  // Trend chart
  const labels = daily14.map(r=>r.date);
  const ctrData = daily14.map(r=>r.forms > 0 && r.cta_clicks > 0 ? +(r.payments/r.cta_clicks*100).toFixed(2) : 0);
  const clickData = daily14.map(r=>r.cta_clicks || 0);

  document.getElementById('funnel').innerHTML = `
    <div class="section-title">Channel Funnel — Last 30 Days (PostHog)</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Channel (utm_source)</th>
          <th class="num">Clicks (CTAs)</th>
          <th class="num">CTA Clicks</th>
          <th class="num">Forms Submitted</th>
          <th class="num">Payments</th>
          <th class="num">Form CVR</th>
          <th class="num">Payment CVR</th>
        </tr></thead>
        <tbody>${channelRows || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">No channel data</td></tr>'}</tbody>
      </table>
    </div>
    <div class="chart-wrap">
      <h3>14-Day Trend: CTA Clicks & Payment CVR</h3>
      <canvas id="trendChart" height="80"></canvas>
    </div>
  `;

  // Render chart
  const ctx = document.getElementById('trendChart');
  if (ctx && labels.length > 0) {
    new Chart(ctx, {
      type:'line',
      data:{
        labels,
        datasets:[
          { label:'CTA Clicks', data:clickData, borderColor:'#3C3489', backgroundColor:'rgba(60,52,137,0.08)', yAxisID:'y', tension:0.3, pointRadius:3 },
          { label:'Payment CVR %', data:ctrData, borderColor:'#085041', backgroundColor:'rgba(8,80,65,0.06)', yAxisID:'y1', tension:0.3, pointRadius:3 }
        ]
      },
      options:{
        responsive:true,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{position:'top'}},
        scales:{
          y:{ type:'linear', position:'left', title:{display:true,text:'CTA Clicks'} },
          y1:{ type:'linear', position:'right', title:{display:true,text:'CVR %'}, grid:{drawOnChartArea:false} }
        }
      }
    });
  }
}

// ── Main: load data.json ──────────────────────────────────────────────────────
async function loadData() {
  const OWNER = 'novelrahman-dev';
  const REPO  = 'mm-google-ads-summary';
  // Add cache-bust to always get fresh data
  const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/data.json?t=${Date.now()}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Update header date
    document.getElementById('data-date').textContent =
      data.generated_at ? `Data as of: ${data.generated_at}` : 'Data loaded';

    renderInsights(data);
    renderCampaigns(data);
    renderFunnel(data);

  } catch (err) {
    const msg = `<div class="error-msg">⚠️ Could not load data.json<br><small>${err.message}</small><br><br>Run "pull morning data" in Claude to refresh.</div>`;
    ['insights','campaigns','funnel'].forEach(id => {
      document.getElementById(id).innerHTML = msg;
    });
  }
}

loadData();
</script>
</body>
</html>
